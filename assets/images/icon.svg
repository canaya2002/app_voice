<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8FD3FF"/>
      <stop offset="100%" style="stop-color:#4F8EF7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8FD3FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4F8EF7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle glow behind the S -->
  <ellipse cx="512" cy="480" rx="280" ry="300" fill="url(#glow)"/>

  <!-- Waveform lines (left side — audio input) -->
  <g stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.4">
    <line x1="180" y1="380" x2="180" y2="440"/>
    <line x1="200" y1="350" x2="200" y2="470"/>
    <line x1="220" y1="370" x2="220" y2="450"/>
    <line x1="240" y1="330" x2="240" y2="490"/>
    <line x1="260" y1="360" x2="260" y2="460"/>
    <line x1="280" y1="340" x2="280" y2="480"/>
    <line x1="300" y1="365" x2="300" y2="455"/>
  </g>

  <!-- Dots (right side — structured output / tokens) -->
  <g fill="url(#accent)" opacity="0.4">
    <circle cx="724" cy="370" r="4"/>
    <circle cx="748" cy="390" r="3"/>
    <circle cx="772" cy="380" r="5"/>
    <circle cx="740" cy="420" r="3"/>
    <circle cx="764" cy="410" r="4"/>
    <circle cx="788" cy="430" r="3"/>
    <circle cx="730" cy="450" r="4"/>
    <circle cx="754" cy="460" r="5"/>
    <circle cx="778" cy="450" r="3"/>
    <circle cx="724" cy="490" r="3"/>
    <circle cx="748" cy="480" r="4"/>
    <circle cx="772" cy="500" r="3"/>
  </g>

  <!-- Stylized "S" letterform with integrated wave -->
  <path
    d="M 560 280
       C 560 280, 440 280, 400 320
       C 360 360, 380 420, 440 440
       L 580 480
       C 640 500, 660 560, 620 600
       C 580 640, 460 640, 460 640"
    fill="none"
    stroke="url(#accent)"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- "Sythio" text below -->
  <text
    x="512" y="760"
    text-anchor="middle"
    font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
    font-weight="700"
    font-size="72"
    fill="#FFFFFF"
    letter-spacing="8"
  >SYTHIO</text>
</svg>
