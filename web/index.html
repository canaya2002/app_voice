    <!-- Structured Data: FAQ (English, complements sythio.com FAQ) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What languages does Sythio support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sythio supports transcription in 90+ languages powered by Whisper, including English, Spanish, French, Portuguese, German, Japanese and many more. Language detection is automatic."
          }
        },
        {
          "@type": "Question",
          "name": "How many notes can I create for free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The free plan allows 2 notes per day with up to 10 minutes of audio each. The Premium plan ($15/month) enables unlimited notes with up to 30 minutes per recording and all 9 AI output modes."
          }
        },
        {
          "@type": "Question",
          "name": "Can Sythio detect who is speaking in a meeting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Sythio automatically detects how many people are in a conversation and attributes each segment of the transcription to the corresponding speaker. You can rename speakers after processing."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between sythio.com and sythio.app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "sythio.com is the main website with product information, pricing, blog and features. sythio.app is the web dashboard where you log in to manage your voice notes, view transcriptions, export documents and collaborate with your team."
          }
        },
        {
          "@type": "Question",
          "name": "What formats can I export my notes to?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can export to Word (.doc), PDF, SRT (subtitles), plain text, and copy to clipboard. You can also share notes via a public link."
          }
        }
      ]
    }
    </script>

    <script>
      // Theme: prevent flash of wrong theme on load
      (function(){
        var t = localStorage.getItem('sythio-theme');
        if (t === 'light') document.documentElement.classList.add('light');
        else if (!t && window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.classList.add('light');
      })();
      // Lang: set html lang from saved preference
      (function(){
        var l = localStorage.getItem('sythio-lang');
        if (l && ['en','es','fr','it','pt'].indexOf(l) !== -1) document.documentElement.lang = l;
      })();
    </script>
